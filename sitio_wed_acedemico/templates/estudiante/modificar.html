<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    </head>
    <body>
        <form action="/estudiante/modificar/{{estudiante[0]}}" method="POST">
            <div class="modal-body">
                <div class="input-group mb-3">
                    <span class="input-group-text">ID</span>
                    <input type="text" class="form-control" placeholder="ID" readonly value="{{estudiante[0]}}">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">Nombre</span>
                    <input type="text" class="form-control" name="atri_1_M_E" value="{{estudiante[1]}}" required>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">Apellido</span>
                    <input type="text" class="form-control" name="atri_2_M_E" value="{{estudiante[2]}}" required>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">Carnet</span>
                    <input type="number" class="form-control" value="{{estudiante[3]}}" readonly>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">Sexo</span>
                    <select class="form-select" required id="atri_3_M_E" name="atri_3_M_E">
                        <option value="" disabled {% if not estudiante[4] %}selected{% endif %}>Seleccione Sexo</option>
                        
                        <option value="M" {% if estudiante[4] == 'M' %}selected{% endif %}>Masculino</option>
                        
                        <option value="F" {% if estudiante[4] == 'F' %}selected{% endif %}>Femenino</option>
                    </select>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">Fecha de nacimiento</span>
                    <input type="date" class="form-control" name="atri_4_M_E" value="{{estudiante[5]}}" required>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">Edad</span>
                    <input type="number" class="form-control" value="{{estudiante[6]}}" readonly>
                </div>
            </div>
            <div class="modal-footer">
                <a href="/" type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</a>
                <button type="submit" class="btn btn-primary">Guardar cambios</button>
            </div>
        </form>
    </body>
</html>
